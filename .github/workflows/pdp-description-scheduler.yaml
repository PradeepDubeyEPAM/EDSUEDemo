name: PDP Description Batch Job

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PDP description generator
        run: node scripts/generate-pdp-descriptions.js
        env:
          AEM_HOST: ${{ secrets.AEM_HOST }}
          AEM_CLIENT_ID: ${{ secrets.AEM_CLIENT_ID }}
          AEM_CLIENT_SECRET: ${{ secrets.AEM_CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AEM_SITE_ORIGIN: ${{ secrets.AEM_SITE_ORIGIN }}