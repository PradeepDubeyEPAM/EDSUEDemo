name: PDP Description Batch Job

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PDP description generator
        run: node scripts/pdp-descriptions.js
        env:
          AEM_HOST: ${{ secrets.AEM_HOST }}
          AEM_CLIENT_ID: ${{ secrets.AEM_CLIENT_ID }}
          AEM_CLIENT_SECRET: ${{ secrets.AEM_CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AEM_SITE_ORIGIN: ${{ secrets.AEM_SITE_ORIGIN }}

      - name: Commit descriptions.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add descriptions.json
          git diff --staged --quiet || git commit -m "chore: update descriptions.json"
          git push