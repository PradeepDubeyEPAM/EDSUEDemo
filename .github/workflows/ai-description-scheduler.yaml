name: AI Description Batch Job

on:
  schedule:
    - cron: '30 18 * * *'  
  workflow_dispatch:       

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run description generator
        run: node scripts/generate-descriptions.js
        env:
          AEM_HOST: ${{ secrets.AEM_HOST }}
          AEM_TOKEN: ${{ secrets.AEM_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AEM_SITE_ORIGIN: ${{ secrets.AEM_SITE_ORIGIN }}